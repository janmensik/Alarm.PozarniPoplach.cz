<!DOCTYPE html>
<html lang="cs">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS (Customized via SCSS) -->
    <link href="{$BASE_URL}/ui/custom.css" rel="stylesheet">

    <title>Požární poplach - Kinetic Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/3208d26f35.js" crossorigin="anonymous"></script>

    <style>
        [x-cloak] { display: none !important; }

        @keyframes pulse-indicator {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .pulse { animation: pulse-indicator 2s infinite; }

        .scrollable-col {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bs-primary) transparent;
        }
    </style>
</head>
<body class="d-flex flex-column vh-100 bg-surface"
      x-data="alarmSystem('{$BASE_URL}/alarm/api/dispatch?pincode={$smarty.get.pincode}')">

    <!-- Header / Unit Status -->
    <div class="container-fluid bg-primary d-flex justify-content-between align-items-center py-2 shadow-sm">
        <h2 class="display-6 text-white pb-0 mb-0">
            <i :class="data.event_icon + ' fa-fade me-2'"></i>
            <span x-text="data.event"></span> - <span x-text="data.event_subtype"></span>
        </h2>
        <div class="d-flex align-items-center">
            <div class="h4 text-white me-3 mb-0 pulse" x-show="loading">●</div>
            <div class="text-white font-monospace h4 mb-0" x-text="currentTime">00:00:00</div>
        </div>
    </div>

    <div class="container-fluid p-0 flex-grow-1 overflow-hidden">
        <template x-if="data">
            <div class="row g-0 h-100" x-cloak>

            <!-- Left Panel: Incident Data -->
            <div class="col-4 p-3 bg-surface-lowest text-white scrollable-col d-flex flex-column border-end border-primary border-opacity-25">

                <!-- Alert Header -->
                <h1 class="alert alert-warning fw-bolder h4 mb-3 border-0 shadow-sm" role="alert">
                    <i :class="data.event_icon + ' fa-fade me-2'"></i>
                    <span x-text="data.event"></span> - <span x-text="data.event_subtype"></span>
                </h1>

                <!-- Tactical Data Card -->
                <div class="card bg-surface-container text-white mb-3 shadow">
                    <div class="card-body">
                        <div class="mb-4">
                            <h3 class="label-sm">Adresa události</h3>
                            <address class="h4 mb-0">
                                <strong class="text-primary-light" x-text="data.address_street || data.address_city"></strong>
                                <span class="text-primary-light" x-text="data.address_house_number"></span>
                                <br />
                                <span x-text="data.address_city"></span>
                                <template x-if="data.address_city_part">
                                    <small class="text-muted">(část: <span x-text="data.address_city_part"></span>)</small>
                                </template>
                            </address>
                        </div>

                        <template x-if="data.object">
                            <div class="mt-3">
                                <h3 class="label-sm">Objekt</h3>
                                <p class="h5" x-text="data.object"></p>
                            </div>
                        </template>

                        <template x-if="data.clarification">
                            <div class="mt-3">
                                <h3 class="label-sm">Upřesnění</h3>
                                <p class="h5" x-text="data.clarification"></p>
                            </div>
                        </template>

                        <template x-if="data.situation">
                            <div class="mt-3">
                                <h3 class="label-sm">Situace</h3>
                                <p class="h5 text-info" x-text="data.situation"></p>
                            </div>
                        </template>

                        <template x-if="data.notifier || data.notifier_phone">
                            <div class="mt-3 pt-3 border-top border-secondary">
                                <h3 class="label-sm">Oznámení</h3>
                                <p class="h5 mb-1" x-text="data.notifier"></p>
                                <p class="h6 text-muted" x-show="data.notifier_phone">
                                    Tel: <span class="text-white" x-text="data.notifier_phone"></span>
                                </p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Other Vehicles Card -->
                <template x-if="data.other_vehicles && data.other_vehicles.length > 0">
                    <div class="card bg-surface-container text-white mb-3 shadow">
                        <div class="card-body">
                            <h3 class="label-sm mb-2">Technika dalších jednotek</h3>
                            <div class="tactical-list-group">
                                <template x-for="vehicle in data.other_vehicles">
                                    <div class="list-group-item active py-1 small" x-text="vehicle.fullname"></div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Metadata -->
                <div class="mb-3 px-1">
                    <template x-if="data.dispatch_identification">
                        <small class="label-sm" style="font-size: 0.6rem; opacity: 0.7;">
                            ID: <span class="text-white" x-text="data.dispatch_identification"></span> |
                            Vyhlášeno: <span class="text-white" x-text="formatDate(data.dispatched_at_ts)"></span>
                        </small>
                    </template>
                    <template x-if="!data.dispatch_identification">
                        <small class="label-sm text-info" x-text="data.info"></small>
                    </template>
                </div>

                <!-- Timer HUD -->
                <div class="mt-auto p-3 bg-primary bg-gradient rounded shadow text-center border border-white border-opacity-10"
                     :class="timerSeconds > 600 ? 'bg-danger' : ''">
                    <h5 class="label-sm text-white opacity-75 mb-1">Doba od vyhlášení</h5>
                    <div class="display-md fw-bold font-monospace" x-text="timerDisplay">00:00</div>
                </div>

            </div>

            <!-- Right Panel: Visual Telemetry -->
            <div class="col-8 d-flex flex-column bg-surface-lowest scrollable-col">

                <!-- Main Map / Sat View -->
                <div class="position-relative flex-grow-1">
                    <img :src="data.directions?.static_big_map" class="img-fluid w-100 h-100 object-fit-cover" alt="Taktická mapa" x-show="data.directions?.static_big_map">

                    <!-- HUD Overlay: Address & Distance -->
                    <div class="position-absolute bottom-0 start-0 end-0 glass-overlay p-3 text-white">
                        <div class="kinetic-hud">
                            <div class="hud-left">
                                <h3 class="label-sm">Cílová adresa</h3>
                                <div class="h5 mb-0">
                                    <span x-text="data.address_street"></span> <span x-text="data.address_house_number"></span>, <span x-text="data.address_city"></span>
                                </div>
                            </div>
                            <div class="hud-right">
                                <div class="d-inline-block me-4 text-start">
                                    <h3 class="label-sm">Vzdálenost</h3>
                                    <div class="h5 mb-0"><span x-text="data.directions?.distance"></span> km</div>
                                </div>
                                <div class="d-inline-block text-start">
                                    <h3 class="label-sm">Doba jízdy</h3>
                                    <div class="h5 mb-0 text-primary-light"><span x-text="data.directions?.duration"></span> min</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bottom Telemetry HUD -->
                <div class="row g-0">
                    <!-- Unit Vehicles -->
                    <div class="col-8 p-3 bg-surface border-top border-primary border-opacity-25">
                        <div class="row g-3 justify-content-start">
                            <template x-for="vehicle in data.unit_vehicles">
                                <div class="col-auto">
                                    <div class="card bg-surface-container border-0 shadow-sm text-center h-100" style="min-width: 120px;">
                                        <div class="card-header py-1 bg-warning text-dark fw-bold" x-text="vehicle.callsign || '---'"></div>
                                        <div class="card-body p-2">
                                            <i :class="'fa-solid ' + (vehicle.vehicle_type_icon || 'fa-truck-fire') + ' fa-3x text-muted mb-2'"></i>
                                            <p class="card-text label-sm mb-0 text-white" x-text="vehicle.name"></p>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Streetview / Satellite Detail -->
                    <div class="col-4 border-start border-top border-primary border-opacity-25 bg-black">
                        <img :src="data.directions?.static_streetview" class="img-fluid w-100" alt="Streetview" x-show="data.directions?.static_streetview">
                    </div>
                </div>
            </div>
        </div>
        </template>

        <!-- Loading State -->
        <div class="h-100 d-flex flex-column justify-content-center align-items-center text-white" x-show="!data && loading">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <div class="display-sm">Navazuji spojení s KOPIS...</div>
        </div>
    </div>

    <!-- Audio Alerts -->
    <!-- <audio id="alarm-sound-start" src="{$BASE_URL}/assets/timer-start.mp3" preload="auto"></audio>
    <audio id="alarm-sound-limit" src="{$BASE_URL}/assets/timer-limit.mp3" preload="auto"></audio> -->

    <script src="{$BASE_URL}/ui/alpine.js" crossorigin="anonymous"></script>
</body>
</html>
